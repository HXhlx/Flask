{% extends "base.html" %}

<div class="layout-wrap" style="min-height:100vh;display:flex;flex-direction:column;justify-content:center;">
    <div class="main-content" style="text-align:center;padding:40px 20px;">
        <img src="{{ url_for('static', filename='images/snow.png') }}" alt="logo" style="width:80px;margin-bottom:20px;">
