{% extends "base.html" %}
{% block title %}登录{% endblock %}
{% block body %}
<div class="layout-wrap">
    <div class="main-content" style="display:flex;align-items:center;justify-content:center;min-height:80vh;">
        <div class="page-container">
            <h1 style="font-size:32px;margin-top:0;">XXXX书店</h1>
            <h2 class="page-title" style="opacity:0.7;font-weight:normal;font-size:15px;">会员登录</h2>
            {% if error %}
            <div class="alert alert-error">{{ error }}</div>
            {% endif %}
            <form method="POST" action="{{ url_for('login_page') }}">
                <div class="form-group">
                    <label for="phone">手机号</label>
                    <input type="tel" id="phone" name="phone" required
                           placeholder="例如：+8613800138000" pattern="^\+?[1-9]\d{6,14}$" maxlength="16">
                </div>
                <button type="submit" class="btn-primary">登录 / 注册</button>
            </form>
            <p class="text-muted" style="text-align:center;">输入手机号登录，未注册过将自动注册新账号</p>
        </div>
    </div>
</div>
{% endblock %}
