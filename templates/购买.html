{% extends "base.html" %}
{% block title %}购买{% endblock %}
{% block body %}
<div id="header">
    <a href="{{ url_for('home') }}">
        <img class="s-image" src="{{ url_for('static', filename='images/返回.png') }}" alt="返回">
    </a>
    <p class="tou" style="margin-left:12px;">购买图书</p>
</div>

<div class="layout-wrap">
    <div class="main-content">
        <div class="card" style="max-width:500px;">
            <div style="display:flex;gap:16px;align-items:flex-start;">
                <img src="{{ url_for('static', filename='images/显示.png') }}" alt="封面" style="width:120px;border-radius:8px;flex-shrink:0;">
                <div>
                    <h2 style="margin-bottom:4px;">人间失格</h2>
                    <p class="text-muted">太宰治</p>
                    <p style="font-size:24px;font-weight:bold;color:var(--gold);margin-top:8px;">&yen;25.00</p>
                </div>
            </div>
            <form method="POST" action="{{ url_for('shopping') }}" style="margin-top:20px;">
                <input type="hidden" name="isbn" value="9787506380263">
                <div class="form-group">
                    <label for="num">数量</label>
                    <input type="number" id="num" name="num" min="1" value="1" required style="max-width:140px;">
                </div>
                <div class="action-btns" style="margin-top:16px;">
                    <a href="{{ url_for('home') }}">
                        <button class="jia-btn" type="button">取消</button>
                    </a>
                    <button class="gou-btn" type="submit">立即下单</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
